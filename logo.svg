<?xml version="1.0" encoding="UTF-8"?>
<svg width="420" height="420" viewBox="0 0 420 420"
     xmlns="http://www.w3.org/2000/svg" role="img">
<title>결 Resonate Tour</title>
<desc>결 Resonate Tour — Korea USA premium travel logo</desc>
<defs>
  <style>@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&amp;display=swap');</style>
  <linearGradient id="bg" x1="0" y1="0" x2="0.6" y2="1">
    <stop offset="0%"   stop-color="#4a6680"/>
    <stop offset="35%"  stop-color="#3a5570"/>
    <stop offset="70%"  stop-color="#264460"/>
    <stop offset="100%" stop-color="#1a3450"/>
  </linearGradient>
  <linearGradient id="goldH" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%"   stop-color="#9a7520"/>
    <stop offset="30%"  stop-color="#d4aa55"/>
    <stop offset="55%"  stop-color="#e8cc75"/>
    <stop offset="100%" stop-color="#9a7520"/>
  </linearGradient>
  <linearGradient id="goldD" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%"   stop-color="#c8a840"/>
    <stop offset="100%" stop-color="#a07828"/>
  </linearGradient>
  <linearGradient id="w1" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%"   stop-color="#c8e8ff" stop-opacity="0"/>
    <stop offset="15%"  stop-color="#c8e8ff" stop-opacity="1"/>
    <stop offset="85%"  stop-color="#c8e8ff" stop-opacity="1"/>
    <stop offset="100%" stop-color="#c8e8ff" stop-opacity="0"/>
  </linearGradient>
  <linearGradient id="w2" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%"   stop-color="#a8d4f0" stop-opacity="0"/>
    <stop offset="12%"  stop-color="#a8d4f0" stop-opacity="1"/>
    <stop offset="88%"  stop-color="#a8d4f0" stop-opacity="1"/>
    <stop offset="100%" stop-color="#a8d4f0" stop-opacity="0"/>
  </linearGradient>
  <linearGradient id="w3" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%"   stop-color="#88c0e8" stop-opacity="0"/>
    <stop offset="10%"  stop-color="#88c0e8" stop-opacity="1"/>
    <stop offset="90%"  stop-color="#88c0e8" stop-opacity="1"/>
    <stop offset="100%" stop-color="#88c0e8" stop-opacity="0"/>
  </linearGradient>
</defs>

<!-- Square card 420×420 -->
<rect width="420" height="420" rx="12" fill="url(#bg)"/>

<!-- Outer gold border -->
<rect width="420" height="420" rx="12" fill="none"
      stroke="url(#goldH)" stroke-width="1.6"/>

<!-- Inner gold border — inset 10px all sides -->
<rect x="10" y="10" width="400" height="400" rx="7" fill="none"
      stroke="url(#goldH)" stroke-width="0.5" opacity="0.38"/>

<!-- TOP rule — inside inner border -->
<line x1="55" y1="22" x2="365" y2="22"
      stroke="url(#goldH)" stroke-width="0.9" opacity="0.55"/>

<!-- TOP corner ornaments — fixed at top -->
<g fill="none" stroke="#c8a844" stroke-width="1.1" opacity="0.42" stroke-linecap="round">
  <polyline points="16,22 16,14 24,14"/>
  <polyline points="404,22 404,14 396,14"/>
</g>

<!-- 결 — tight under top rule -->
<text x="210" y="155"
      text-anchor="middle"
      dominant-baseline="middle"
      font-family="'Apple SD Gothic Neo','Malgun Gothic','NanumGothic',sans-serif"
      font-weight="700"
      font-size="185"
      fill="url(#goldH)">결</text>

<!-- Waves through middle of 결 -->
<path d="M 0,148 C 42,128 78,168 120,148 C 162,128 198,168 240,148 C 282,128 318,168 360,148 C 385,138 400,142 420,140"
      fill="none" stroke="url(#w1)" stroke-width="2.0" stroke-linecap="round" opacity="0.55"/>
<path d="M 0,162 C 38,146 80,178 118,162 C 158,146 198,178 238,162 C 278,146 318,178 358,162 C 386,154 402,157 420,155"
      fill="none" stroke="url(#w2)" stroke-width="1.4" stroke-linecap="round" opacity="0.38"/>
<path d="M 0,174 C 42,164 82,184 122,174 C 162,164 202,184 242,174 C 282,164 322,184 362,174 C 388,169 404,171 420,170"
      fill="none" stroke="url(#w3)" stroke-width="1.0" stroke-linecap="round" opacity="0.22"/>

<!-- Divider line — below 결 -->
<line x1="100" y1="236" x2="320" y2="236"
      stroke="url(#goldH)" stroke-width="0.7" opacity="0.42"/>

<!-- Diamond -->
<polygon points="210,246 219,255 210,264 201,255"
         fill="url(#goldD)" opacity="0.92"/>
<!-- Dots left -->
<circle cx="178" cy="255" r="2.6" fill="url(#goldD)" opacity="0.60"/>
<circle cx="165" cy="255" r="1.6" fill="url(#goldD)" opacity="0.36"/>
<!-- Dots right -->
<circle cx="242" cy="255" r="2.6" fill="url(#goldD)" opacity="0.60"/>
<circle cx="255" cy="255" r="1.6" fill="url(#goldD)" opacity="0.36"/>

<!-- RESONATE -->
<text x="210" y="313"
      text-anchor="middle"
      font-family="'Playfair Display', Georgia, serif"
      font-size="34" font-weight="700" letter-spacing="9"
      fill="url(#goldH)">RESONATE</text>

<!-- TOUR -->
<text x="210" y="348"
      text-anchor="middle"
      font-family="'Playfair Display', Georgia, serif"
      font-size="20" font-weight="700" letter-spacing="15"
      fill="#c8a844" opacity="0.88">TOUR</text>

<!-- KOREA ↔ USA -->
<text x="210" y="371"
      text-anchor="middle"
      font-family="'Playfair Display', Georgia, serif"
      font-size="11" letter-spacing="4"
      fill="#c8a844" opacity="0.72">KOREA  &#x2194;  USA</text>

<!-- BOTTOM rule — fixed at bottom inside inner border -->
<line x1="55" y1="398" x2="365" y2="398"
      stroke="url(#goldH)" stroke-width="0.9" opacity="0.55"/>

<!-- BOTTOM corner ornaments — fixed at bottom -->
<g fill="none" stroke="#c8a844" stroke-width="1.1" opacity="0.42" stroke-linecap="round">
  <polyline points="16,398 16,406 24,406"/>
  <polyline points="404,398 404,406 396,406"/>
</g>

</svg>
